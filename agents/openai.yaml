interface:
  display_name: "AdonisJS 7 Strict"
  short_description: "Fail-closed deterministic AdonisJS + Inertia React doctrine"
  default_prompt: >-
    Use $adonisjs-7-deterministic in fail-closed mode. Follow
    `select-profile`, `load-targeted-references`,
    `list-applicable-hard-blockers`, `detect-conflicts`,
    `ask-one-override-question`, and `run-final-compliance-check`. Enforce
    `hb.official-packages`, `hb.data-stack`, `hb.validation-stack`,
    `hb.auth-browser-stack`, `hb.guard-names`, `hb.browser-csrf`,
    `hb.access-tokens-external`, `hb.web-ui-stack`,
    `hb.official-side-effect-packages`, `hb.web-api-controller-separation`,
    `hb.no-express-fastify-composition`, `hb.no-repository-layer`,
    `hb.no-edge-feature-rendering`, `hb.no-request-all-only`, `hb.no-any`,
    `hb.no-raw-io-and-timers`, `hb.no-client-fetch-stack`,
    `hb.no-client-form-stack`, and `hb.no-custom-api-keys-default`. Ask
    exactly one short override question when a hard blocker conflicts.
    Final answers must include `selected-profile:`, `override-status:`,
    and `hard-blocker-compliance:`.
